name: Build 99 Karing SRS rules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"
  push:
    paths:
      - "providers.json"
      - "scripts/**"
      - "tools/srscompiler/**"
      - "requirements.txt"
      - ".github/workflows/build-rules.yml"

permissions:
  contents: write

concurrency:
  group: karing-srs-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"
          cache-dependency-path: tools/srscompiler/go.sum

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build SRS compiler
        working-directory: tools/srscompiler
        run: |
          mkdir -p ../../bin
          go build -trimpath -o ../../bin/srscompiler .

      - name: Run offline converter self-test
        run: python scripts/self_test.py --compiler bin/srscompiler

      - name: Download, convert and compile all rules
        env:
          RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/rules
        run: |
          python scripts/build_rules.py \
            --compiler bin/srscompiler \
            --raw-base "$RAW_BASE"

      - name: Validate exactly 99 SRS files
        run: python scripts/validate.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules source-json build-report.json KARING_URLS.md
          if git diff --cached --quiet; then
            echo "No rule changes."
          else
            git commit -m "chore: update 99 Karing SRS rules"
            git push
          fi

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karing-srs-build-diagnostics
          path: |
            build-report.json
            KARING_URLS.md
            rules/index.json
          if-no-files-found: ignore
          retention-days: 7
